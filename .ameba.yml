# Ameba configuration for Crysterm.
#
# Rationale lives next to each rule so the suppressions stay auditable. Run with
# `--all-rules` or comment a section out to re-surface anything below.

# --- Scope --------------------------------------------------------------------
# Lint only the shipping library and its specs. examples/, benchmarks/, tools/,
# tests/ is demo / scratch code; its warnings (stray `p`
# debug calls, throwaway unused assignments, benchmark shadowing) are noise and
# were ~35% of the report.
Globs:
  - src/**/*.cr
  - spec/**/*.cr

# --- False positives (the rule's suggestion is wrong here) --------------------

# `SidedGeometry#any?` / `Margin#any?` are domain methods ("is any amount set on
# any side?"), not `Enumerable#any?`. Rewriting to `!empty?` or `present?` would
# be incorrect (`present?` does not even exist on these types; the autocorrect
# breaks the build).
Performance/AnyInsteadOfEmpty:
  Enabled: false
Performance/AnyInsteadOfPresent:
  Enabled: false

# The rule token-matches `.lines.each` assuming `String#lines` (which allocates
# an array). Here `lines` is a stored buffer property — `Screen#lines`
# (`Array(Row)`) and `CLines#lines` (`getter lines : Array(String)`) — so there
# is no allocation, and the suggested `each_line` does not exist on those types.
# `lines` is a core buffer concept across the codebase, so the rule only misfires.
Performance/ExcessiveAllocations:
  Enabled: false

# `not_nil!` is idiomatic in test setup/assertions; flagging it across the spec
# suite is noise. Still active for src/.
Lint/NotNil:
  Excluded:
    - spec/**/*.cr

# --- Deliberate, pervasive project conventions --------------------------------

# Short single-letter block parameters (|w|, |c|, |s|) are the house style,
# applied consistently across the codebase. This rule alone was ~half the report.
Naming/BlockParameterName:
  Enabled: false

# `set_image`, `set_resources(*args)`, `set_index`, ... are blessed.js-derived
# public API names (many take arguments and are not plain accessors).
Naming/AccessorMethodName:
  Enabled: false

# Boolean `property force = false` style is standard Crystal and used throughout;
# we do not rename these to `force?`.
Naming/QueryBoolMethods:
  Enabled: false

# TODO / NOTE / FIXME admonitions are intentional in-code work markers, not
# things to clear before the linter passes.
Documentation/DocumentationAdmonition:
  Enabled: false

# Parentheses around an assignment-in-condition (`if (x = foo)`, `elsif (n =
# t.to_i?)`) are used deliberately here to signal "intentional assignment, not
# `==`". Stripping them removes that cue, so the rule is off.
Style/ParenthesesAroundCondition:
  Enabled: false

# `return/next unless cond` guard clauses are idiomatic even when `cond` contains
# a negation (`unless text && !text.empty?`); mechanically inverting them to `if`
# generally reads worse for early-exit guards.
Style/NegatedConditionsInUnless:
  Enabled: false

# --- Relaxed thresholds -------------------------------------------------------

# TUI rendering, damage calculation and event dispatch are legitimately branchy.
# Keep the rule active to catch genuine monsters, but raise the floor above the
# normal-but-busy methods (most reports sat in the 11-20 range).
Metrics/CyclomaticComplexity:
  MaxComplexity: 30
