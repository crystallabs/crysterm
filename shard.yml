name: crysterm
version: 1.0.0

authors:
  - Davor Ocelic <docelic@crystallabs.io>

crystal: 1.0.0

license: AGPLv3

# Note: the `crysterm` CLI (src/remote/bin/crysterm.cr) is intentionally NOT a
# build target — it only works with the remote subsystem. Build it explicitly:
#   crystal build src/remote/bin/crysterm.cr -Dremote -o bin/crysterm

dependencies:
  tput:
    github: crystallabs/tput
    branch: master
  crystallabs-helpers:
    github: crystallabs/crystallabs-helpers.cr
    branch: master
  term_colors:
    github: crystallabs/term_colors
    branch: master
  w3m_image_display:
    github: SamualLB/w3mimagedisplay
  event_handler:
    github: crystallabs/event_handler
    branch: master
  gpm:
    github: crystallabs/gpm.cr
    branch: master
  pnggif:
    github: crystallabs/pnggif
    branch: master
  superconf:
    github: crystallabs/superconf.cr
    branch: master
  html5:
    github: naqvis/crystal-html5
  markd:
    github: icyleaf/markd

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
    branch: master
