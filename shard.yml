name: crysterm
version: 1.0.0

authors:
  - Davor Ocelic <docelic@crystallabs.io>

crystal: 1.0.0

license: AGPLv3

dependencies:
  tput:
    github: crystallabs/tput
    branch: master
  crystallabs-helpers:
    github: crystallabs/crystallabs-helpers.cr
    # Kept as a version requirement (resolves to 1.0.1, == current master):
    # `tput` (master) also requires this via `~> 1.0`, and shards refuses to
    # mix a `branch:` and a `version:` requirement for the same shard.
    version: ~> 1.0
  term_colors:
    github: crystallabs/term_colors
    branch: master
  w3m_image_display:
    github: SamualLB/w3mimagedisplay
  #i18n:
  #  github: BrucePerens/i18n
  event_handler:
    github: crystallabs/event_handler
    branch: master
  gpm:
    github: crystallabs/gpm.cr
    branch: master

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
    version: ~> 1.6.3
