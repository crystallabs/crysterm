<w-screen>
  <!-- Appearance travels with the layout: this <style> is handed straight to
       the CSS parser. Run with:  crysterm run examples/selfcontained.html -->
  <style>
    Box {
      color: white;
      background-color: #222244;
    }
    #title {
      color: yellow;
      background-color: blue;
      border: solid cyan;
    }
    Button {
      color: black;
      background-color: gray;
      border: solid white;
    }
    Button:focus {
      background-color: green;
      font-weight: bold;
    }
  </style>

  <w-box id="title" top="center" left="center" width="34" height="7" parse-tags="true"
         content="{center}A whole app in {bold}one HTML file{/bold}.\nStructure + CSS, no handler.{/center}"></w-box>

  <!-- Declarative quit: needs no handler process at all. -->
  <w-button id="bye" top="center+5" left="center" width="14" height="3" parse-tags="true"
            onclick="quit" content="{center}Quit{/center}"></w-button>
</w-screen>
