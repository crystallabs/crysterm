<w-screen>
  <w-box id="status" top="2" left="center" width="46" height="3" parse-tags="true"
         content="{center}Waiting for the bash handler…{/center}"></w-box>

  <w-button id="save" top="6" left="center" width="18" height="3" parse-tags="true"
            onclick="save" content="{center}Save{/center}"></w-button>

  <w-button id="ping" top="10" left="center" width="18" height="3" parse-tags="true"
            onclick="ping" content="{center}Ping{/center}"></w-button>

  <!-- Declarative action: toggles a class with NO handler process involved. -->
  <w-button id="hl" top="14" left="center" width="18" height="3" parse-tags="true"
            onclick="toggle-class:#status:done" content="{center}Highlight{/center}"></w-button>

  <!-- Declarative quit: works even when no handler is connected. -->
  <w-button id="bye" top="18" left="center" width="18" height="3" parse-tags="true"
            onclick="quit" content="{center}Quit{/center}"></w-button>
</w-screen>
